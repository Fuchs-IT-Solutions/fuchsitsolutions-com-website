<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitkarte - Jürgen Fuchs | Fuchs IT-Solutions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Farben exakt von der Website */
            --primary: #26c6da;
            --primary-dark: #00acc1;
            --secondary: #00838f;
            --bg: #000000;
            --bg-card: #0d1117;
            --text: #f8fafc;
            --text-muted: #8b949e;
            --fox-orange: #ee671b;
            --fox-navy: #142f51;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Inter", sans-serif;
            background-color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 60px;
            padding: 40px;
        }

        /* Business Card Dimensions: 85mm x 55mm (scaled for display) */
        .card {
            width: 850px; 
            height: 550px;
            background-color: var(--bg);
            border-radius: 24px;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.6);
            overflow: hidden;
            color: var(--text);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* Vorderseite */
        #front {
            background-image: 
                radial-gradient(circle at 80% 20%, rgba(38, 198, 218, 0.08), transparent 40%),
                radial-gradient(circle at 20% 80%, rgba(238, 103, 27, 0.03), transparent 40%);
            justify-content: center;
            align-items: center;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 35px;
        }

        /* Das echte logo.svg wird hier eingebunden */
        .logo-svg {
            width: 200px;
            height: 200px;
            filter: drop-shadow(0 0 10px rgba(38, 198, 218, 0.1));
        }

        .company-name {
            font-size: 64px;
            font-weight: 800;
            letter-spacing: -2px;
        }

        .text-gradient {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Rückseite */
        #back {
            background-color: var(--bg-card);
            padding: 70px;
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            align-items: center;
            background-image: 
                linear-gradient(135deg, rgba(38, 198, 218, 0.02) 0%, transparent 100%),
                radial-gradient(circle at 100% 0%, rgba(238, 103, 27, 0.04), transparent 50%);
        }

        .info-header h1 {
            font-size: 56px;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }

        .info-header .role {
            font-size: 26px;
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .contact-list {
            border-left: 2px solid rgba(255,255,255,0.05);
            padding-left: 50px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 20px;
            text-decoration: none;
            color: var(--text);
            transition: transform 0.2s ease;
        }

        .contact-icon {
            width: 52px;
            height: 52px;
            background: rgba(38, 198, 218, 0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 24px;
        }

        .contact-text {
            font-size: 20px;
            font-weight: 500;
            white-space: nowrap;
        }

        .footer-branding {
            position: absolute;
            bottom: 45px;
            left: 70px;
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            opacity: 0.5;
        }

        @media print {
            body { background: white; padding: 0; }
            .card { box-shadow: none; border: 1px solid #ddd; margin-bottom: 20px; page-break-after: always; }
        }
    </style>
</head>
<body>

    <!-- VORDERSEITE -->
    <div class="card" id="front">
        <div class="logo-container">
            <!-- Hier nutzen wir exakt Ihr logo.svg File -->
            <img src="logo.svg" alt="Fuchs IT-Solutions Logo" class="logo-svg">
            <div class="company-name">
                Fuchs <span class="text-gradient">IT-Solutions</span>
            </div>
        </div>
    </div>

    <!-- RÜCKSEITE -->
    <div class="card" id="back">
        <div class="info-header">
            <h1>Jürgen Fuchs</h1>
            <p class="role">CEO</p>
        </div>
        <div class="contact-list">
            <a href="mailto:juergen.fuchs@fuchsitsolutions.com" class="contact-item">
                <div class="contact-icon">✉</div>
                <div class="contact-text">juergen.fuchs@fuchsitsolutions.com</div>
            </a>
            <a href="tel:+4369981815909" class="contact-item">
                <div class="contact-icon">✆</div>
                <div class="contact-text">+43 699 81815909</div>
            </a>
            <a href="https://www.fuchsitsolutions.com" class="contact-item" target="_blank">
                <div class="contact-icon">🌐</div>
                <div class="contact-text">www.fuchsitsolutions.com</div>
            </a>
            <a href="https://linkedin.com/in/jfuchs2" class="contact-item" target="_blank">
                <div class="contact-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                </div>
                <div class="contact-text">linkedin.com/in/jfuchs2</div>
            </a>
        </div>
        <div class="footer-branding">Fuchs IT-Solutions GmbH</div>
    </div>

</body>
</html>
